name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Lint
  lint:
    name: Lint (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Test matrix
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, beta]
        include:
          - os: ubuntu-latest
            toolchain: "1.74"  # MSRV for the CLI application dependencies

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - name: Test workspace (all features)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cargo test --workspace --all-features -- --test-threads=1
          else
            cargo test --workspace --all-features
          fi
      - run: cargo test --workspace
      - run: cargo test --workspace --lib --no-default-features
      - run: cargo build --features cli --bin cobol-packed
      - run: cargo build --features converter --bin cobol2rust

  # SIMD-specific test (AVX2 target)
  test-avx2:
    name: Test (AVX2 target feature)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C target-feature=+avx2"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features simd,avx2

  # Nightly (docs, miri, unstable lints)
  nightly:
    name: Nightly checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Miri (decode paths)
        run: cargo miri test -- decode
      - name: Build docs (all features)
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "--cfg docsrs"

  # Benchmarks compile check
  bench-check:
    name: Benchmarks compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --no-run --all-features

  # Examples compile check
  examples:
    name: Examples compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --examples --all-features

  cli-smoke:
    name: CLI smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features cli --test cli_smoke
      - run: cargo run --features cli --bin cobol-packed -- decode --digits 4 --scale 2 --signed --hex 01234C

  feature-combinations:
    name: Feature combination checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo check --features cli --bin cobol-packed
      - run: cargo check --features converter --bin cobol2rust
      - run: cargo check --workspace
      - run: cargo check --features simd
      - run: cargo check --workspace --all-features

  converter-smoke:
    name: COBOL-to-Rust converter smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features converter --test converter_smoke
      - name: Generated Rust project compiles
        shell: bash
        run: |
          mkdir -p target/converter-ci
          cat > target/converter-ci/hello.cbl <<'EOF'
          IDENTIFICATION DIVISION.
          PROGRAM-ID. HELLO.
          PROCEDURE DIVISION.
          MAIN.
          DISPLAY "HELLO".
          STOP RUN.
          EOF
          cargo run --features converter --bin cobol2rust -- convert \
            --input target/converter-ci/hello.cbl \
            --out target/converter-ci/generated \
            --dialect ibm \
            --source-format free
          cargo check --manifest-path target/converter-ci/generated/Cargo.toml

  converter-oracle:
    name: COBOL-to-Rust GnuCOBOL oracle tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install GnuCOBOL
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol || sudo apt-get install -y gnucobol4
          mkdir -p oracle-evidence
          cobc --version
          cobc --version > oracle-evidence/gnucobol-version.txt
      - name: Run oracle tests
        shell: bash
        run: |
          cargo test --features converter --test oracle_gnucobol -- --nocapture 2>&1 | tee oracle-evidence/oracle-test.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gnucobol-oracle-evidence
          path: oracle-evidence
          if-no-files-found: error

  supply-chain:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo install cargo-deny --locked
      - run: cargo audit
      - run: cargo deny check
      - name: Generate Cargo metadata SBOM
        shell: bash
        run: |
          mkdir -p supply-chain
          cargo metadata --format-version 1 --locked > supply-chain/SBOM.cargo-metadata.json
      - uses: actions/upload-artifact@v4
        with:
          name: supply-chain-sbom
          path: supply-chain/SBOM.cargo-metadata.json
          if-no-files-found: error

  fuzz-smoke:
    name: Fuzz harness smoke build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz build fuzz_decode
      - run: cargo fuzz build --features simd fuzz_decode
      - run: cargo fuzz build fuzz_schema_batch
      - run: cargo fuzz build fuzz_record_codecs
      - run: cargo fuzz build --features simd fuzz_record_codecs
      - run: cargo fuzz build fuzz_record_layout
      - run: cargo fuzz build fuzz_source_parser

  # Minimal dependency versions
  minimal-versions:
    name: Minimal dependency versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly update -Z minimal-versions
      - run: cargo +nightly test --workspace --all-features
